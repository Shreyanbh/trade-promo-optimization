version: "3.9"

services:
  # ── Dashboard (default) ───────────────────────────────────────────────────
  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./config.yaml:/app/config.yaml
    env_file:
      - .env
    environment:
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - COMPUTE_PROVIDER=${COMPUTE_PROVIDER:-local}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
    restart: unless-stopped

  # ── Pipeline runner (one-shot) ────────────────────────────────────────────
  pipeline:
    build: .
    command: python -m src.run_all.pipeline_runner
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./config.yaml:/app/config.yaml
    env_file:
      - .env
    profiles:
      - pipeline     # run with: docker compose --profile pipeline up pipeline

  # ── Local MinIO (S3-compatible, for testing S3 storage locally) ───────────
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    profiles:
      - s3-local

volumes:
  minio_data:
