# ─────────────────────────────────────────────────────────────────────────────
# Trade Promo Optimization — Source Registry
#
# Define every data source your organisation uses here.
# The loader consolidates all sources into the four pipeline tables:
#   customers | transactions | products | promotions
#
# Supported source types:  file | database | api
# Supported file formats:  csv | parquet | excel | json | xml | avro | delta
# Supported databases:     postgresql | mysql | sqlite | snowflake | bigquery
#                          redshift | mssql (anything with a SQLAlchemy driver)
# Supported APIs:          any REST API with page / offset / cursor / link pagination
#
# Values support ${ENV_VAR} and ${ENV_VAR:-default} substitution.
# ─────────────────────────────────────────────────────────────────────────────

sources:

  # ── EXAMPLE 1: Local CSV files ────────────────────────────────────────────
  - name: local_customers
    type: file
    path: data/raw/structured/customers        # directory or exact file
    format: parquet                             # csv | parquet | excel | json | xml | avro | delta
    maps_to: customers
    # column_map is optional — auto-detected if omitted
    column_map: {}

  - name: local_transactions
    type: file
    path: data/raw/structured/transactions
    format: parquet
    maps_to: transactions
    column_map: {}

  - name: local_products
    type: file
    path: data/raw/structured/products.xlsx
    format: excel
    sheet_name: Products
    maps_to: products
    column_map: {}

  - name: local_promotions
    type: file
    path: data/raw/structured/promotions.json
    format: json
    maps_to: promotions
    column_map: {}


  # ── EXAMPLE 2: Multiple glob-matched files ────────────────────────────────
